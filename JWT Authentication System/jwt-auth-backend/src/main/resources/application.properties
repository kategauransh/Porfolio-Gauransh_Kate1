# Application Server Configuration
server.port=${PORT:8080}

# H2 In-Memory Database Configuration (Default for Zero-Setup Local Boot)
spring.datasource.url=jdbc:h2:mem:jwt_auth_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL Database Configuration (Alternative Production-Style DB)
# Uncomment these to connect to your local running PostgreSQL instance:
# spring.datasource.url=jdbc:postgresql://localhost:5432/jwt_auth_db
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Uncomment when using PostgreSQL:
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Settings (Secret Key must be at least 256 bits, base64 encoded or plain text)
# This is a sample 256-bit key: "5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437"
application.security.jwt.secret-key=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
# Expiration: 1 day in milliseconds (86400000)
application.security.jwt.expiration=86400000
